<style>
:root{
  --accent:#7C5CFF;
  --accent-d:#4E2BEF;
  --accent-soft:#BBAAFF;
  --text:#FFFFFF;
  --text2:#F0ECFF;
  --muted:#D8D0F5;
  --muted-strong:#EEE9FF;
  --surface:rgba(255,255,255,0.085);
  --surface-2:rgba(255,255,255,0.125);
  --surface-deep:rgba(12,8,26,0.76);
  --border:rgba(255,255,255,0.20);
  --border-bright:rgba(255,255,255,0.36);
  --shadow:0 30px 90px rgba(0,0,0,0.34);
  --glass-blur:blur(24px) saturate(155%);
  --success:#22c55e;
  --error:#f87171;
  --ease:cubic-bezier(.22,1,.36,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 16px;
  color:var(--text);
  background:
    radial-gradient(circle at 12% 15%, rgba(124,92,255,0.26), transparent 28%),
    radial-gradient(circle at 82% 22%, rgba(108,71,255,0.20), transparent 26%),
    radial-gradient(circle at 50% 88%, rgba(165,118,255,0.12), transparent 32%),
    linear-gradient(135deg,#070410 0%,#100B20 42%,#19102F 72%,#090514 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.045), transparent 28%, rgba(255,255,255,0.025) 55%, transparent 78%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 35%);
  z-index:-2;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/%3E%3C/svg%3E");
  z-index:-1;
}

.bg-blob{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  filter:blur(72px);
  opacity:.72;
  animation:floatBlob 10s ease-in-out infinite;
  z-index:0;
}

.blob-one{
  width:330px;
  height:330px;
  top:7%;
  left:5%;
  background:rgba(124,92,255,0.32);
}

.blob-two{
  width:280px;
  height:280px;
  right:8%;
  bottom:8%;
  background:rgba(204,156,255,0.22);
  animation-delay:1.3s;
}

.bg-grid{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.11;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size:36px 36px;
  mask-image:radial-gradient(circle at center, black 38%, transparent 86%);
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:465px;
}

.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.055));
  border:1px solid var(--border);
  border-radius:32px;
  padding:38px 34px 32px;
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.18);
  animation:fadeUp .65s var(--ease) both;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,0.18), transparent 32%),
    radial-gradient(circle at 88% 18%, rgba(187,170,255,0.16), transparent 34%);
  pointer-events:none;
}

.card > *{
  position:relative;
  z-index:1;
}

.brand{
  display:flex;
  justify-content:center;
  margin-bottom:18px;
}

.brand svg{
  width:136px;
  height:auto;
  display:block;
}

.kicker{
  width:max-content;
  max-width:100%;
  margin:0 auto 13px;
  padding:7px 13px;
  border:1px solid rgba(255,255,255,0.22);
  border-radius:999px;
  color:#fff;
  background:rgba(255,255,255,0.075);
  font-size:.76rem;
  font-weight:800;
  letter-spacing:.02em;
  backdrop-filter:blur(14px);
}

.title{
  text-align:center;
  font-size:clamp(1.9rem, 6vw, 2.35rem);
  line-height:1.08;
  font-weight:800;
  letter-spacing:-.045em;
  margin-bottom:10px;
  text-shadow:0 8px 30px rgba(0,0,0,0.26);
}

.title span{
  background:linear-gradient(135deg,#FFFFFF 0%,#D8CCFF 45%,#A98EFF 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:var(--muted-strong);
  font-size:.96rem;
  line-height:1.75;
  font-weight:600;
  margin-bottom:26px;
}

.input-wrap{
  position:relative;
}

.input{
  width:100%;
  padding:15px 15px;
  margin-bottom:14px;
  border-radius:17px;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.075);
  color:#fff;
  outline:none;
  font-family:inherit;
  font-size:.94rem;
  font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);
  transition:border-color .25s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease), transform .25s var(--ease);
}

.input::placeholder{
  color:rgba(240,236,255,0.62);
  font-weight:600;
}

.input:focus{
  border-color:rgba(187,170,255,0.70);
  background:rgba(255,255,255,0.11);
  box-shadow:0 0 0 4px rgba(124,92,255,0.16), inset 0 1px 0 rgba(255,255,255,0.14);
}

.row{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.row .input{
  flex:1;
}

.btn{
  width:100%;
  padding:15px 18px;
  border:none;
  border-radius:17px;
  font-family:inherit;
  font-size:.94rem;
  font-weight:800;
  cursor:pointer;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease), border-color .25s var(--ease), opacity .25s var(--ease);
}

.btn:hover:not(:disabled){
  transform:translateY(-2px);
}

.btn:disabled{
  opacity:.62;
  cursor:not-allowed;
}

.btn-primary{
  margin-top:4px;
  background:linear-gradient(135deg,#5C38FF,#A084FF);
  color:#fff;
  border:1px solid rgba(255,255,255,0.24);
  box-shadow:0 18px 42px rgba(124,92,255,0.34), inset 0 1px 0 rgba(255,255,255,0.24);
}

.btn-primary:hover:not(:disabled){
  box-shadow:0 22px 52px rgba(124,92,255,0.44), inset 0 1px 0 rgba(255,255,255,0.28);
}

.btn-secondary{
  width:112px;
  flex:0 0 112px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.22);
  color:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.12);
}

.btn-secondary:hover:not(:disabled){
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.34);
}

.message{
  min-height:21px;
  text-align:center;
  margin-top:14px;
  font-size:.86rem;
  line-height:1.5;
  font-weight:700;
}

.success{color:#54e58a;}
.error{color:#ff9292;}
.hidden{display:none;}

.back{
  text-align:center;
  margin-top:18px;
  color:var(--muted);
  font-size:.9rem;
  font-weight:700;
}

.back a{
  color:#E5DEFF;
  text-decoration:none;
  font-weight:800;
  transition:color .25s var(--ease), text-shadow .25s var(--ease);
}

.back a:hover{
  color:#fff;
  text-shadow:0 0 20px rgba(187,170,255,0.55);
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(22px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes floatBlob{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-14px) scale(1.04);}
}

@media(max-width:520px){
  body{
    padding:18px 12px;
  }

  .card{
    padding:30px 20px 26px;
    border-radius:27px;
  }

  .brand svg{
    width:122px;
  }

  .row{
    flex-direction:column;
    gap:0;
  }

  .btn-secondary{
    width:100%;
    flex:auto;
    margin-bottom:14px;
  }
}

<script>
let otpSent=false;
let verified=false;

const ROLE="user";
const LOGIN_PAGE="login.html";
const API_BASE=window.location.origin.includes("5000")
  ? window.location.origin
  : (window.location.protocol === "file:" ? "https://orbit-persoanlised-event-discovery.onrender.com" : "");

const msg=document.getElementById('msg');
const emailInput=document.getElementById('email');
const otpInput=document.getElementById('otp');
const passInput=document.getElementById('newPass');
const confirmInput=document.getElementById('confirmPass');
const otpSection=document.getElementById('otpSection');
const passwordSection=document.getElementById('passwordSection');
const sendOtpBtn=document.getElementById('sendOtp');
const submitBtn=document.getElementById('submitBtn');

function showMsg(text,type){
  msg.innerText=text || "Something went wrong";
  msg.className="message "+(type || "error");
}

async function requestAPI(path, body){
  let res;
  try{
    res=await fetch(API_BASE+path,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body:JSON.stringify(body)
    });
  }catch(err){
    throw new Error("Flask is not running. Start it with: python app.py");
  }

  const text=await res.text();
  let data={};
  try{
    data=text ? JSON.parse(text) : {};
  }catch(err){
    console.error("Non JSON response from Flask:", text);
    throw new Error("Flask returned HTML error. Check terminal red traceback.");
  }

  if(!res.ok || data.success===false){
    throw new Error(data.error || data.message || "Request failed");
  }
  return data;
}

async function sendOtp(){
  const email=emailInput.value.trim().toLowerCase();
  if(!email){ showMsg("Enter your email first","error"); return; }

  sendOtpBtn.disabled=true;
  submitBtn.disabled=true;
  showMsg("Sending OTP...","success");

  try{
    const data=await requestAPI("/send-otp",{email,role:ROLE});
    otpSent=true;
    otpSection.classList.remove('hidden');
    submitBtn.innerText="Verify OTP";
    showMsg(data.debug_otp ? `OTP created for debug: ${data.debug_otp}` : "OTP sent successfully to your email","success");
  }catch(err){
    showMsg(err.message,"error");
  }finally{
    sendOtpBtn.disabled=false;
    submitBtn.disabled=false;
  }
}

sendOtpBtn.onclick=sendOtp;

document.getElementById('form').onsubmit=async(e)=>{
  e.preventDefault();

  const email=emailInput.value.trim().toLowerCase();
  const otp=otpInput.value.trim();
  const pass=passInput.value;
  const confirm=confirmInput.value;

  if(!email){ showMsg("Enter your email first","error"); return; }

  if(!otpSent){
    otpSection.classList.remove('hidden');
    await sendOtp();
    return;
  }

  if(!verified){
    if(!otp){ showMsg("Enter OTP","error"); return; }
    try{
      submitBtn.disabled=true;
      await requestAPI("/verify-otp",{email,otp,role:ROLE});
      verified=true;
      passwordSection.classList.remove('hidden');
      showMsg("OTP verified ✓. Enter new password.","success");
      submitBtn.innerText="Change Password";
      submitBtn.disabled=false;
    }catch(err){
      showMsg(err.message,"error");
      submitBtn.disabled=false;
    }
    return;
  }

  if(pass.length<8){ showMsg("Password must be at least 8 characters","error"); return; }
  if(pass!==confirm){ showMsg("Passwords do not match","error"); return; }

  try{
    submitBtn.disabled=true;
    await requestAPI("/reset-password",{email,otp,password:pass,role:ROLE});
    showMsg("Password changed successfully ✓","success");
    setTimeout(()=>location.href=LOGIN_PAGE,1500);
  }catch(err){
    showMsg(err.message,"error");
    submitBtn.disabled=false;
  }
};
</script>
