<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit - Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #8C72FF;
      --accent-dark: #6C47FF;
      --bg: #0E0A18;
      --card: rgba(255, 255, 255, 0.08);
      --card-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.14);
      --text: #F7F4FF;
      --muted: #BDB4D8;
      --danger: #ff7b9c;
      --success: #78f0b4;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(140, 114, 255, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(226, 161, 255, 0.12), transparent 30%),
        linear-gradient(135deg, #070511 0%, #110B20 48%, #1B1230 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 26%, transparent 78%);
      pointer-events: none;
      opacity: .65;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      animation: fadeUp .8s var(--ease) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .logo svg {
      width: 150px;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(140, 114, 255, .22));
    }

    .login-card {
      width: 100%;
      padding: 38px 34px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(145%);
    }

    .title {
      text-align: center;
      margin-bottom: 28px;
    }

    .title h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .title p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .input-box {
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 15px;
      outline: none;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      transition: .3s var(--ease);
    }

    .field input::placeholder {
      color: rgba(247,244,255,.42);
    }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 0 4px rgba(140,114,255,.16);
    }

    .toggle-pass {
      position: absolute;
      top: 50%;
      right: 13px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-weight: 700;
      font-size: .8rem;
      cursor: pointer;
    }

    .toggle-pass:hover {
      color: var(--accent);
    }

    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px 16px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(108, 71, 255, .28);
      transition: transform .28s var(--ease), box-shadow .28s var(--ease), opacity .2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(108, 71, 255, .38);
    }

    .login-btn:disabled {
      cursor: wait;
      opacity: .78;
      transform: none;
    }

    .message {
      min-height: 22px;
      margin-top: 16px;
      text-align: center;
      font-size: .86rem;
      font-weight: 700;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }

    .back-link {
      display: block;
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 700;
      transition: color .25s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      body { padding: 18px; }
      .login-card { padding: 30px 22px; border-radius: 24px; }
      .title h1 { font-size: 1.7rem; }
    }

<body>
  <main class="login-wrap">
    <div class="logo">
      <svg viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" aria-label="Orbit logo">
        <defs>
          <linearGradient id="orbitGradAdminNormal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E2A1FF" />
            <stop offset="45%" stop-color="#9D87FF" />
            <stop offset="100%" stop-color="#6C47FF" />
          </linearGradient>
        </defs>
        <g transform="translate(4,4)">
          <circle cx="26" cy="26" r="18" fill="none" stroke="url(#orbitGradAdminNormal)" stroke-width="8" stroke-linecap="round" stroke-dasharray="74 24" transform="rotate(-16 26 26)" />
          <circle cx="26" cy="26" r="5.5" fill="#ffffff" />
        </g>
        <text x="72" y="42" font-size="35" font-weight="800" font-family="Plus Jakarta Sans, sans-serif" fill="#F4F1FF">Or</text>
        <text x="116" y="42" font-size="35" font-weight="800" font-family="Plus Jakarta Sans, sans-serif" fill="#8C72FF">bit</text>
      </svg>
    </div>

    <section class="login-card">
      <div class="title">
        <h1>Admin Login</h1>
        <p>Enter your admin credentials to continue.</p>
      </div>

      <form id="adminForm" novalidate>
        <div class="field">
          <label for="adminUser">Username</label>
          <input id="adminUser" type="text" placeholder="Enter username" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="adminPass">Password</label>
          <div class="input-box">
            <input id="adminPass" type="password" placeholder="Enter password" autocomplete="current-password" required />
            <button type="button" class="toggle-pass" id="togglePass">Show</button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">Login</button>
        <p id="statusMsg" class="message"></p>
      </form>

      <a href="/" class="back-link">← Back to Home</a>
    </section>
  </main>

  <!-- Admin UPI Settings Modal -->
  <div id="adminUpiModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:9999;align-items:center;justify-content:center;padding:20px;">
    <div style="background:linear-gradient(145deg,rgba(13,9,28,.98),rgba(6,4,14,.98));border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px;max-width:460px;width:100%;box-shadow:0 28px 80px rgba(0,0,0,.58);">
      <h2 style="font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:4px;">Admin Payment Settings</h2>
      <p style="color:#BDB4DB;font-size:.9rem;margin-bottom:20px;">Configure your admin UPI for receiving payments</p>
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#BDB4DB;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Admin UPI ID</label>
        <input id="adminUpiInput" type="text" placeholder="admin@bank" style="width:100%;padding:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:15px;color:#fff;font-family:inherit;outline:none;" />
        <div style="color:#8fffc0;font-size:.75rem;margin-top:8px;">Payments from users will be sent to this UPI</div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#BDB4DB;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">QR Code Image URL (optional)</label>
        <input id="adminQrInput" type="text" placeholder="https://..." style="width:100%;padding:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:15px;color:#fff;font-family:inherit;outline:none;" />
        <div style="color:#BDB4DB;font-size:.75rem;margin-top:8px;">URL to admin QR code image</div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button onclick="saveAdminUpi()" style="flex:1;background:linear-gradient(135deg,#5C38FF,#8C72FF);border:none;border-radius:15px;padding:15px;color:#fff;font-weight:800;cursor:pointer;">Save Settings</button>
        <button onclick="closeAdminUpiModal()" style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:15px;padding:15px;color:#fff;font-weight:800;cursor:pointer;">Cancel</button>
      </div>
      <div id="adminUpiStatus" style="margin-top:12px;text-align:center;min-height:20px;font-size:.85rem;"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('adminForm');
    const usernameInput = document.getElementById('adminUser');
    const passwordInput = document.getElementById('adminPass');
    const togglePass = document.getElementById('togglePass');
    const loginBtn = document.getElementById('loginBtn');
    const statusMsg = document.getElementById('statusMsg');

    function showMessage(message, type) {
      statusMsg.textContent = message || '';
      statusMsg.className = 'message ' + (type || '');
    }

    function resetButton() {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }

    togglePass.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      togglePass.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showMessage('Please enter username and password.', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      showMessage('', '');

      try {
        const response = await fetch('/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: username, email: username, password: password })
        });

        const text = await response.text();
        let data = {};

        if (text) {
          try {
            data = JSON.parse(text);
          } catch (err) {
            throw new Error('Server returned HTML/error instead of JSON. Check Flask terminal.');
          }
        }

        if (!response.ok || data.success === false) {
          const message = data.error || data.message || 'Invalid credentials. Please try again.';
          showMessage(message, 'error');
          resetButton();
          return;
        }

        showMessage('Login successful. Redirecting...', 'success');
        // clear sensitive inputs before redirect
        passwordInput.value = '';
        togglePass.textContent = 'Show';
        window.location.href = data.redirect || '/adp.html';
      } catch (err) {
        showMessage(err.message || 'Invalid credentials. Please try again.', 'error');
        resetButton();
      }
    });

    // Admin UPI Settings Functions
    function openAdminUpiModal() {
      const modal = document.getElementById('adminUpiModal');
      const upiInput = document.getElementById('adminUpiInput');
      const qrInput = document.getElementById('adminQrInput');
      const stored = JSON.parse(localStorage.getItem('adminUpiSettings') || '{}');
      upiInput.value = stored.upi_id || '';
      qrInput.value = stored.qr_code || '';
      modal.style.display = 'flex';
    }

    function closeAdminUpiModal() {
      document.getElementById('adminUpiModal').style.display = 'none';
    }

    async function saveAdminUpi() {
      const upiId = document.getElementById('adminUpiInput').value.trim();
      const qrCode = document.getElementById('adminQrInput').value.trim();
      const statusDiv = document.getElementById('adminUpiStatus');

      if (!upiId) {
        statusDiv.innerHTML = '<span style="color:#ff9aa9;">Please enter admin UPI ID</span>';
        return;
      }

      const settings = {
        upi_id: upiId,
        qr_code: qrCode,
        updated_at: new Date().toISOString()
      };

      try {
        // Save to localStorage
        localStorage.setItem('adminUpiSettings', JSON.stringify(settings));

        // Try to save to backend
        try {
          await fetch('/api/admin-settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(settings)
          });
        } catch (err) {
          console.log('Backend save failed, using localStorage only');
        }

        statusDiv.innerHTML = '<span style="color:#8fffc0;">Settings saved successfully!</span>';
        setTimeout(() => closeAdminUpiModal(), 2000);
      } catch (err) {
        statusDiv.innerHTML = '<span style="color:#ff9aa9;">Error saving settings</span>';
      }
    }

    window.addEventListener('click', (e) => {
      const modal = document.getElementById('adminUpiModal');
      if (e.target === modal) closeAdminUpiModal();
    });
  </script>
</body>
</html>
